<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 4px rgba(34, 197, 94, 0);
            }
        }
        .status-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-white text-neutral-900 min-h-screen">
    <div class="max-w-3xl mx-auto px-6 py-12">

        <header class="text-center mb-12">
            <h1 class="text-2xl font-bold text-neutral-900 tracking-tight">System</h1>
            <p class="text-xs text-neutral-400 mt-1 font-mono"><span id="gitHash">--</span></p>
            <p id="last-update" class="text-sm text-neutral-400 mt-1">Connecting...</p>
        </header>

        <section class="mb-8">
            <div class="space-y-3">

                <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-neutral-900">CPU</span>
                        <span class="text-sm text-neutral-900 tabular-nums"><span id="cpu-value">--</span>%</span>
                    </div>
                    <div class="h-1 bg-neutral-100 rounded-full overflow-hidden">
                        <div id="cpu-bar" class="h-full rounded-full transition-all duration-300" style="width: 0%; background: #22c55e;"></div>
                    </div>
                    <div id="cpu-temp-container" class="mt-2 text-xs text-neutral-400 hidden">
                        Temperature: <span id="cpu-temp">--°C</span>
                    </div>
                </div>

                <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-neutral-900">Memory</span>
                        <span class="text-sm text-neutral-900 tabular-nums"><span id="ram-value">--</span> / <span id="ram-total">-- GB</span></span>
                    </div>
                    <div class="h-1 bg-neutral-100 rounded-full overflow-hidden">
                        <div id="ram-bar" class="h-full rounded-full transition-all duration-300" style="width: 0%; background: #22c55e;"></div>
                    </div>
                    <div class="mt-2 text-xs text-neutral-400"><span id="ram-percent">--</span>% used</div>
                </div>

                <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-neutral-900">Swap</span>
                        <span class="text-sm text-neutral-900 tabular-nums"><span id="swap-value">--</span> / <span id="swap-total">-- GB</span></span>
                    </div>
                    <div class="h-1 bg-neutral-100 rounded-full overflow-hidden">
                        <div id="swap-bar" class="h-full rounded-full transition-all duration-300" style="width: 0%; background: #22c55e;"></div>
                    </div>
                    <div class="mt-2 text-xs text-neutral-400"><span id="swap-percent">--</span>% used</div>
                </div>

                <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-neutral-900">Disk</span>
                        <span class="text-sm text-neutral-900 tabular-nums"><span id="disk-used">--</span> / <span id="disk-total">-- GB</span></span>
                    </div>
                    <div class="h-1 bg-neutral-100 rounded-full overflow-hidden">
                        <div id="disk-bar" class="h-full rounded-full transition-all duration-300" style="width: 0%; background: #22c55e;"></div>
                    </div>
                    <div class="mt-2 text-xs text-neutral-400"><span id="disk-percent">--</span>% used · <span id="disk-free">--</span> GB free</div>
                </div>

            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xs font-medium text-neutral-400 uppercase tracking-wider mb-3">Network</h2>
            <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <div class="text-xs text-neutral-400 mb-1">Inbound</div>
                        <div class="text-lg text-green-500 tabular-nums"><span id="net-rx-value">--</span> <span class="text-sm text-neutral-400">MB/s</span></div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-neutral-400 mb-1">Outbound</div>
                        <div class="text-lg text-neutral-900 tabular-nums"><span id="net-tx-value">--</span> <span class="text-sm text-neutral-400">MB/s</span></div>
                    </div>
                </div>
                <div class="h-32">
                    <canvas id="network-chart"></canvas>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xs font-medium text-neutral-400 uppercase tracking-wider mb-3">Activity</h2>
            <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors mb-3">
                <div class="text-sm font-medium text-neutral-900 mb-3">CPU</div>
                <div class="h-32">
                    <canvas id="cpu-chart"></canvas>
                </div>
            </div>
            <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                <div class="text-sm font-medium text-neutral-900 mb-3">Memory</div>
                <div class="h-32">
                    <canvas id="memory-chart"></canvas>
                </div>
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xs font-medium text-neutral-400 uppercase tracking-wider mb-3">Top Processes</h2>
            <div class="border border-neutral-200 rounded-lg p-4 hover:bg-neutral-50 transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-sm font-medium text-neutral-900">By CPU</div>
                    <div class="text-xs text-neutral-400"><span id="processes-value">--</span> total processes</div>
                </div>
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-neutral-200">
                            <th class="pb-2 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">Process</th>
                            <th class="pb-2 text-right text-xs font-medium text-neutral-400 uppercase tracking-wider">CPU</th>
                            <th class="pb-2 text-right text-xs font-medium text-neutral-400 uppercase tracking-wider">RAM</th>
                        </tr>
                    </thead>
                    <tbody id="processes-table">
                        <tr><td colspan="3" class="py-3 text-center text-neutral-400 text-sm">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="pt-6 border-t border-neutral-200">
            <div class="flex items-center justify-center gap-2 text-xs text-neutral-400">
                <span class="status-pulse w-2 h-2 bg-green-500 rounded-full inline-block"></span>
                <span>Live</span>
                <span class="mx-2">·</span>
                <span>Uptime: <span id="uptime-value">--</span></span>
            </div>
        </footer>

    </div>

    <script>
        const MAX_HISTORY = 60;

        let cpuChart, networkChart, memoryChart;

        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            scales: {
                x: { display: false },
                y: {
                    beginAtZero: true,
                    grid: { color: '#f5f5f5', drawBorder: false },
                    ticks: { color: '#a3a3a3', font: { size: 10, family: 'Plus Jakarta Sans' } }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        };

        async function loadVersion() {
            try {
                const response = await fetch('/version.json');
                const data = await response.json();
                document.getElementById('gitHash').textContent = data.gitHash || 'unknown';
            } catch (error) {
                document.getElementById('gitHash').textContent = 'unknown';
            }
        }

        function initCharts() {
            const cpuCtx = document.getElementById('cpu-chart').getContext('2d');
            cpuChart = new Chart(cpuCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'CPU %',
                        data: [],
                        borderColor: '#171717',
                        backgroundColor: 'rgba(23, 23, 23, 0.05)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 0,
                        borderWidth: 1.5
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: { ...chartOptions.scales.y, suggestedMax: 100 }
                    }
                }
            });

            const networkCtx = document.getElementById('network-chart').getContext('2d');
            networkChart = new Chart(networkCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Inbound',
                            data: [],
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.05)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 1.5
                        },
                        {
                            label: 'Outbound',
                            data: [],
                            borderColor: '#171717',
                            backgroundColor: 'rgba(23, 23, 23, 0.05)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 1.5
                        }
                    ]
                },
                options: chartOptions
            });

            const memoryCtx = document.getElementById('memory-chart').getContext('2d');
            memoryChart = new Chart(memoryCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'RAM',
                            data: [],
                            borderColor: '#171717',
                            backgroundColor: 'rgba(23, 23, 23, 0.05)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 1.5
                        },
                        {
                            label: 'Swap',
                            data: [],
                            borderColor: '#a3a3a3',
                            backgroundColor: 'rgba(163, 163, 163, 0.05)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 1.5
                        }
                    ]
                },
                options: chartOptions
            });
        }

        function formatUptime(secs) {
            const days = Math.floor(secs / 86400);
            const hours = Math.floor((secs % 86400) / 3600);
            const mins = Math.floor((secs % 3600) / 60);

            let str = '';
            if (days > 0) str += `${days}d `;
            str += `${hours}h ${mins}m`;
            return str;
        }

        function truncateName(name, maxLen = 24) {
            return name.length > maxLen ? name.substring(0, maxLen) + '...' : name;
        }

        function getProgressColor(value) {
            if (value >= 90) return '#ef4444';
            if (value >= 70) return '#facc15';
            return '#22c55e';
        }

        function updateGauges(data) {
            const cpuPercent = data.cpu_percent;
            document.getElementById('cpu-value').textContent = cpuPercent.toFixed(1);
            const cpuBar = document.getElementById('cpu-bar');
            cpuBar.style.width = `${Math.min(cpuPercent, 100)}%`;
            cpuBar.style.background = getProgressColor(cpuPercent);

            if (data.cpu_temp_celsius !== null && data.cpu_temp_celsius !== undefined) {
                document.getElementById('cpu-temp').textContent = `${data.cpu_temp_celsius.toFixed(1)}°C`;
                document.getElementById('cpu-temp-container').classList.remove('hidden');
            }

            const ramPercent = data.ram_percent;
            document.getElementById('ram-value').textContent = data.ram_used_gb.toFixed(2);
            document.getElementById('ram-total').textContent = `${data.ram_total_gb.toFixed(1)} GB`;
            document.getElementById('ram-percent').textContent = ramPercent.toFixed(1);
            const ramBar = document.getElementById('ram-bar');
            ramBar.style.width = `${Math.min(ramPercent, 100)}%`;
            ramBar.style.background = getProgressColor(ramPercent);

            const swapPercent = data.swap_percent;
            document.getElementById('swap-value').textContent = data.swap_used_gb.toFixed(2);
            document.getElementById('swap-total').textContent = data.swap_total_gb > 0 ? `${data.swap_total_gb.toFixed(1)} GB` : '0 GB';
            document.getElementById('swap-percent').textContent = swapPercent.toFixed(1);
            const swapBar = document.getElementById('swap-bar');
            swapBar.style.width = `${Math.min(swapPercent, 100)}%`;
            swapBar.style.background = getProgressColor(swapPercent);

            const diskPercent = data.disk_percent;
            document.getElementById('disk-used').textContent = data.disk_used_gb.toFixed(1);
            document.getElementById('disk-total').textContent = `${data.disk_total_gb.toFixed(0)} GB`;
            document.getElementById('disk-percent').textContent = diskPercent.toFixed(1);
            document.getElementById('disk-free').textContent = data.disk_free_gb.toFixed(1);
            const diskBar = document.getElementById('disk-bar');
            diskBar.style.width = `${Math.min(diskPercent, 100)}%`;
            diskBar.style.background = getProgressColor(diskPercent);

            document.getElementById('processes-value').textContent = data.processes;
            document.getElementById('uptime-value').textContent = formatUptime(data.uptime_secs);

            document.getElementById('net-rx-value').textContent = data.net_rx_mbps.toFixed(2);
            document.getElementById('net-tx-value').textContent = data.net_tx_mbps.toFixed(2);

            const tbody = document.getElementById('processes-table');
            if (data.top_processes && data.top_processes.length > 0) {
                tbody.innerHTML = data.top_processes.map(p => `
                    <tr class="border-b border-neutral-100 last:border-0">
                        <td class="py-2 text-sm text-neutral-900">${truncateName(p.name)}</td>
                        <td class="py-2 text-right text-sm text-neutral-600 tabular-nums">${p.cpu_percent.toFixed(1)}%</td>
                        <td class="py-2 text-right text-sm text-neutral-400 tabular-nums">${p.ram_mb.toFixed(0)} MB</td>
                    </tr>
                `).join('');
            }

            const now = new Date();
            document.getElementById('last-update').textContent = `Updated ${now.toLocaleTimeString()}`;
        }

        function updateCharts(history) {
            cpuChart.data.labels = history.timestamps.map(t => t + 's');
            cpuChart.data.datasets[0].data = history.cpu;
            cpuChart.update('none');

            networkChart.data.labels = history.timestamps.map(t => t + 's');
            networkChart.data.datasets[0].data = history.net_rx;
            networkChart.data.datasets[1].data = history.net_tx;
            networkChart.update('none');

            memoryChart.data.labels = history.timestamps.map(t => t + 's');
            memoryChart.data.datasets[0].data = history.ram;
            memoryChart.data.datasets[1].data = history.swap;
            memoryChart.update('none');
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();

                updateGauges(data.current);
                updateCharts(data.history);
            } catch (error) {
                console.error('Failed to fetch metrics:', error);
                document.getElementById('last-update').textContent = 'Connection error';
            }
        }

        loadVersion();
        initCharts();
        fetchMetrics();

        setInterval(fetchMetrics, 2000);
    </script>
</body>
</html>
